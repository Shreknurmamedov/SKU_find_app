name: Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Export TFLite model into app assets
        run: |
          python -m pip install --upgrade pip
          pip install "numpy<2" ultralytics
          python ml/export_tflite.py
          if [ -f weights/product_guard_cls.pt ]; then
            python ml/export_product_guard_tflite.py
          else
            echo "weights/product_guard_cls.pt not found; building APK without product guard asset"
          fi
          ls -la mobile/android/app/src/main/assets/models/

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        working-directory: mobile/android
        run: gradle :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sku-find-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
